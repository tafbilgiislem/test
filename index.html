<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Live Editor PRO</title>

<style>

body{
font-family:Arial;
padding:20px;
}

#svg-container{

width:100%;
max-width:1200px;
aspect-ratio:16/9;

border:1px solid #ccc;

margin-bottom:20px;

}

#svg-container svg{

width:100%;
height:100%;

}

input{

display:block;
width:350px;

margin:5px;
padding:6px;

}

button{

padding:6px 15px;
margin:5px;

cursor:pointer;

}

</style>

</head>

<body>

<h2>SVG Live Editor</h2>

<div id="svg-container"></div>

<input id="titleInput">
<input id="subtitleInput">

<button onclick="preview()">Preview</button>

<button onclick="save()">Save</button>

<button onclick="undo()">Undo</button>

<script>

const workerURL="https://githubtoken.tafbilgiislem.workers.dev/";
const apiKey="SVG_SECRET_12345";

const svgURL="https://raw.githubusercontent.com/tafbilgiislem/ypm/refs/heads/main/slayt.svg";

let lastState="";

async function loadSVG(){

const res=await fetch(svgURL+"?"+Date.now());

const text=await res.text();

document.getElementById("svg-container").innerHTML=text;

const svg=document.querySelector("svg");

svg.setAttribute("viewBox","0 0 1920 1080");

svg.setAttribute("preserveAspectRatio","xMidYMid meet");

lastState=svg.outerHTML;

syncInputs();

}

function syncInputs(){

const svg=document.querySelector("svg");

const t=svg.getElementById("title");

const s=svg.getElementById("subtitle");

if(t)
titleInput.value=t.textContent;

if(s)
subtitleInput.value=s.textContent;

}

function preview(){

const svg=document.querySelector("svg");

lastState=svg.outerHTML;

const t=svg.getElementById("title");

const s=svg.getElementById("subtitle");

if(t)
t.textContent=titleInput.value;

if(s)
s.textContent=subtitleInput.value;

}

function undo(){

document.querySelector("svg").outerHTML=lastState;

syncInputs();

}

async function save(){

const svg=document.querySelector("svg");

const data=svg.outerHTML;

await fetch(workerURL,{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":apiKey

},

body:JSON.stringify({

svg:data

})

});

alert("SVG kaydedildi");

}

loadSVG();

</script>

</body>

</html>
