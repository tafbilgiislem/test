<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Live Editor 1920x1080 - YPM</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }

  /* Responsive 16:9 container */
  #svg-container {
    position: relative;
    width: 100%;
    max-width: 1920px;
    margin-bottom: 20px;
    padding-top: 56.25%; /* 1080 / 1920 = 0.5625 */
    border: 1px solid #ccc;
    overflow: visible;
  }

  #svg-container svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  input {
    display: block;
    width: 100%;
    max-width: 400px;
    margin: 5px 0;
    padding: 5px;
    box-sizing: border-box;
  }

  button {
    margin: 5px 5px 15px 0;
    padding: 5px 10px;
  }

  @media (max-width: 800px) {
    #svg-container { padding-top: 56.25%; }
    input { width: 100%; max-width: 100%; }
  }
</style>
</head>
<body>

<h2>SVG Live Editor - 1920x1080 YPM</h2>

<div id="svg-container"></div>

<input id="titleInput" placeholder="Başlık">
<input id="subtitleInput" placeholder="Alt başlık">

<button onclick="preview()">Önizleme</button>
<button onclick="save()">Kaydet</button>

<script>
// Worker ve SVG ayarları
const workerURL = "https://githubtoken.tafbilgiislem.workers.dev/"; // Worker URL
const apiKey = "SVG_SECRET_12345";                     // Worker API Key
const svgRawURL = "https://tafbilgiislem.github.io/ypm/slayt.svg"; // SVG dosya URL

// SVG yükleme ve cache bypass
async function loadSVG() {
  try {
    const res = await fetch(svgRawURL + "?t=" + Date.now());
    const text = await res.text();
    document.getElementById("svg-container").innerHTML = text;

    const svg = document.querySelector("#svg-container svg");
    if (svg) {
      // inputları senkronize et
      const title = svg.getElementById("text13");
      const subtitle = svg.getElementById("text14");
      if (title) document.getElementById("titleInput").value = title.textContent;
      if (subtitle) document.getElementById("subtitleInput").value = subtitle.textContent;

      // SVG görünürlük ve oran ayarı
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
      svg.setAttribute("width", "100%");
      svg.setAttribute("height", "100%");
    }

    console.log("SVG yüklendi");
  } catch (err) {
    console.error("SVG yüklenemedi:", err);
  }
}

// Sayfa açıldığında yükle
loadSVG();

// Önizleme fonksiyonu
function preview() {
  const svg = document.querySelector("#svg-container svg");
  if (!svg) { alert("SVG bulunamadı"); return; }
  const title = svg.getElementById("title");
  const subtitle = svg.getElementById("subtitle");
  if (title) title.textContent = document.getElementById("titleInput").value;
  if (subtitle) subtitle.textContent = document.getElementById("subtitleInput").value;
}

// Save fonksiyonu (Worker üzerinden commit) + DOM anında güncelle
async function save() {
  const svg = document.querySelector("#svg-container svg");
  if (!svg) { alert("SVG bulunamadı"); return; }

  const updatedSVG = svg.outerHTML;

  try {
    const res = await fetch(workerURL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey
      },
      body: JSON.stringify({ svg: updatedSVG })
    });

    const text = await res.text();
    alert(text);

    // Kaydetme sonrası DOM’u güncelle → input ve SVG aynı kalır
    const title = svg.getElementById("title");
    const subtitle = svg.getElementById("subtitle");
    if (title) title.textContent = document.getElementById("titleInput").value;
    if (subtitle) subtitle.textContent = document.getElementById("subtitleInput").value;

  } catch (err) {
    console.error("Fetch hata:", err);
    alert("Fetch hatası, console'a bak!");
  }
}
</script>

</body>
</html>
