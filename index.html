<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>SVG CMS</title>

</head>

<body>

<h2>SVG Editor</h2>

<div id="svg"></div>

<br>

<input id="title" placeholder="Başlık">

<br>

<input id="subtitle" placeholder="Alt başlık">

<br><br>

<button onclick="preview()">

Preview

</button>

<button onclick="save()">

Kaydet

</button>

<script>

const workerURL="https://githubtoken.tafbilgiislem.workers.dev/";

const apiKey="SVG_SECRET_12345";

fetch(

"https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg"

)

.then(r=>r.text())

.then(data=>{

document.getElementById("svg").innerHTML=data;

});

function preview(){

const svg=document.querySelector("svg");

svg.getElementById("title").textContent=

document.getElementById("title").value;

svg.getElementById("subtitle").textContent=

document.getElementById("subtitle").value;

}

async function save(){

try{

const svg=document.querySelector("svg").outerHTML;

const res=await fetch(

workerURL,

{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":apiKey

},

body:JSON.stringify({

svg:svg

})

}

);

const text=await res.text();

alert(text);

}
catch(e){

alert("Fetch hata");

}

}

</script>

</body>

</html>
