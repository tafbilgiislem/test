<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>SVG Auto Editor</title>

<style>

body{
font-family:Arial;
padding:20px;
}

#svg-container{

width:100%;
max-width:1200px;

aspect-ratio:16/9;

border:1px solid #ccc;

margin-bottom:20px;

}

#svg-container svg{

width:100%;
height:100%;

}

input{

display:block;

width:400px;

margin:5px;

padding:6px;

}

button{

padding:6px 15px;

margin:5px;

cursor:pointer;

}

#editor{

margin-top:20px;

}

</style>

</head>

<body>

<h2>SVG Auto Text Editor</h2>

<div id="svg-container"></div>

<div id="editor"></div>

<button onclick="preview()">Preview</button>

<button onclick="save()">Save</button>

<button onclick="undo()">Undo</button>

<script>

const workerURL="https://githubtoken.tafbilgiislem.workers.dev/";

const apiKey="SVG_SECRET_12345";

const svgURL="https://raw.githubusercontent.com/tafbilgiislem/ypm/refs/heads/main/slayt.svg";

let lastState="";

let textMap=[];

async function loadSVG(){

const res=await fetch(svgURL+"?"+Date.now());

const svgText=await res.text();

document.getElementById("svg-container").innerHTML=svgText;

const svg=document.querySelector("svg");

svg.setAttribute("viewBox","0 0 1920 1080");

svg.setAttribute("preserveAspectRatio","xMidYMid meet");

lastState=svg.outerHTML;

buildEditor();

}

function buildEditor(){

const svg=document.querySelector("svg");

const texts=svg.querySelectorAll("text");

const editor=document.getElementById("editor");

editor.innerHTML="";

textMap=[];

let i=0;

texts.forEach(t=>{

let id=t.id;

if(!id){

id="text_auto_"+i;

t.id=id;

}

const input=document.createElement("input");

input.value=t.textContent;

input.dataset.target=id;

input.placeholder=id;

editor.appendChild(input);

textMap.push(input);

i++;

});

}

function preview(){

const svg=document.querySelector("svg");

lastState=svg.outerHTML;

textMap.forEach(input=>{

const id=input.dataset.target;

const el=svg.getElementById(id);

if(el)
el.textContent=input.value;

});

}

function undo(){

document.querySelector("svg").outerHTML=lastState;

buildEditor();

}

async function save(){

const svg=document.querySelector("svg");

const data=svg.outerHTML;

await fetch(workerURL,{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":apiKey

},

body:JSON.stringify({

svg:data

})

});

alert("SVG kaydedildi");

}

loadSVG();

</script>

</body>

</html>
