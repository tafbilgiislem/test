<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor | Özel Kontrol Sürümü</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; }
        * { box-sizing: border-box; touch-action: auto; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Giriş Ekranı */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 30px; border-radius: 16px; width: 320px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }

        #app-container { display: none; height: 100vh; flex-direction: row; width: 100%; }
        @media (max-width: 1023px) { #app-container { flex-direction: column; } }

        /* Sidebar & Editor */
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 1023px) { #sidebar { width: 100%; height: 50%; order: 2; border-top: 1px solid var(--border); } }
        
        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); }
        .sidebar-nav { padding: 12px; background: #111827; border-bottom: 1px solid var(--border); }

        /* Ön İzleme Alanı - Ekrana Sığacak Şekilde Büyütüldü */
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px; position: relative; }
        #svg-wrapper { position: relative; background: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px black; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Kontroller */
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        .delete-btn { position: absolute; right: 12px; top: 12px; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 20px; }
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; }
        
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 4px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .value-badge { background: #0f172a; color: var(--accent); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 6px; }
    </style>
</head>
<body>

<div id="status-info">BEKLEYİN...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Sistem Girişi</h2>
        <input type="password" id="passInput" placeholder="Şifre">
        <button onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <select id="file-selector" onchange="loadSlide()" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px;">
                <option value="slayt.svg">Slayt 1</option>
                <option value="info.svg">Slayt 2</option>
            </select>
            <div style="display:flex; gap:8px;">
                <button onclick="saveData()" style="flex:2; padding:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
                <button onclick="addNewText()" style="flex:1; padding:12px; background:#3b82f6; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ T</button>
                <button onclick="document.getElementById('img-in').click()" style="flex:1; padding:12px; background:#f97316; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ IMG</button>
            </div>
            <input type="file" id="img-in" hidden onchange="addNewImage(this)">
        </div>
        <div id="editor-fields"></div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // URL'NİZİ BURAYA YAZIN
    let SHA_KEY = "", SESSION_PASS = "", selectedEl = null, offset = {x:0, y:0};

    // Renk formatı düzeltici (#333 -> #333333)
    function safeColor(color) {
        if (!color) return "#ffffff";
        if (color.length === 4) return "#" + color[1] + color[1] + color[2] + color[2] + color[3] + color[3];
        return color.startsWith('#') && color.length === 7 ? color : "#ffffff";
    }

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;
        SESSION_PASS = pass;
        await loadSlide();
    }

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info');
        st.style.display = "block";
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            const data = await res.json();
            SHA_KEY = data.sha;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            initEditor();
            st.style.display = "none";
        } catch(e) { alert("Hata!"); st.style.display="none"; }
    }

    function initEditor() {
        const svg = document.querySelector('#canvas-inner svg');
        if (!svg) return;

        // Sadece sınıfı "duzenlenebilir" olanları veya yeni eklenenleri bulur
        initDragging(svg);
        renderFields();
    }

    function initDragging(svg) {
        const getCoords = (e) => {
            const rect = svg.getBoundingClientRect();
            const vb = svg.viewBox.baseVal;
            const x = (e.clientX - rect.left) * (vb.width / rect.width);
            const y = (e.clientY - rect.top) * (vb.height / rect.height);
            return { x, y };
        };

        svg.onmousedown = (e) => {
            const el = e.target.closest('.duzenlenebilir');
            if (el) {
                selectedEl = el;
                const p = getCoords(e);
                offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0);
                offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0);
            }
        };

        window.onmousemove = (e) => {
            if (!selectedEl) return;
            const p = getCoords(e);
            selectedEl.setAttribute("x", p.x - offset.x);
            selectedEl.setAttribute("y", p.y - offset.y);
        };

        window.onmouseup = () => { selectedEl = null; };
        
        // Mobil dokunmatik
        svg.ontouchstart = (e) => svg.onmousedown(e.touches[0]);
        window.ontouchmove = (e) => window.onmousemove(e.touches[0]);
        window.ontouchend = () => window.onmouseup();
    }

    function renderFields() {
        const f = document.getElementById('editor-fields');
        f.innerHTML = "";
        
        // SADECE "duzenlenebilir" sınıfına sahip öğeleri bulur (İlk halindeki gibi)
        document.querySelectorAll('.duzenlenebilir').forEach((el, i) => {
            const b = document.createElement('div');
            b.className = 'field-box';
            const col = el.getAttribute('fill') || el.style.fill || "#ffffff";
            
            let content = `<span class="delete-btn" onclick="document.getElementById('${el.id}').remove(); renderFields();">×</span>`;
            content += `<div style="font-size:10px; color:#3b82f6; font-weight:bold;">${el.tagName.toUpperCase()} #${i+1}</div>`;

            if (el.tagName === 'text') {
                const fs = parseInt(window.getComputedStyle(el).fontSize) || 40;
                content += `
                    <input type="text" value="${el.textContent}" oninput="document.getElementById('${el.id}').textContent=this.value" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #444; margin-top:8px; border-radius:6px;">
                    <div class="label-row"><span class="label-text">YAZI BOYUTU</span><span class="value-badge" id="val-fs-${i}">${fs}px</span></div>
                    <input type="range" min="10" max="400" value="${fs}" oninput="document.getElementById('${el.id}').style.fontSize=this.value+'px'; document.getElementById('${el.id}').setAttribute('font-size', this.value); document.getElementById('val-fs-${i}').innerText=this.value+'px';">
                    <div class="label-row"><span class="label-text">RENK</span></div>
                    <input type="color" value="${safeColor(col)}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('fill', this.value); t.style.fill=this.value;" style="width:50px; height:45px; cursor:pointer; border:none; background:none;">
                `;
            } else {
                const w = parseFloat(el.getAttribute("width")) || 200;
                const h = parseFloat(el.getAttribute("height")) || 200;
                content += `
                    <div class="label-row"><span class="label-text">GENİŞLİK</span><span class="value-badge" id="val-w-${i}">${Math.round(w)}px</span></div>
                    <input type="range" min="10" max="1800" value="${w}" oninput="document.getElementById('${el.id}').setAttribute('width', this.value); document.getElementById('val-w-${i}').innerText=Math.round(this.value)+'px';">
                    <div class="label-row"><span class="label-text">YÜKSEKLİK</span><span class="value-badge" id="val-h-${i}">${Math.round(h)}px</span></div>
                    <input type="range" min="10" max="1800" value="${h}" oninput="document.getElementById('${el.id}').setAttribute('height', this.value); document.getElementById('val-h-${i}').innerText=Math.round(this.value)+'px';">
                `;
            }
            
            b.innerHTML = content;
            f.appendChild(b);
        });
    }

    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg');
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "t" + Date.now(); 
        t.setAttribute("class", "duzenlenebilir"); // ÖNEMLİ: Sınıf eklendi, böylece kayıttan sonra da bulunur.
        t.setAttribute("x", 200); t.setAttribute("y", 200); t.setAttribute("fill", "#000000");
        t.style.fontSize = "60px"; t.textContent = "YENİ METİN";
        svg.appendChild(t); renderFields();
    }

    function addNewImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg');
            const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "i" + Date.now(); 
            img.setAttribute("class", "duzenlenebilir"); // ÖNEMLİ: Sınıf eklendi.
            img.setAttribute("x", 100); img.setAttribute("y", 100);
            img.setAttribute("width", 300); img.setAttribute("height", 300);
            img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            svg.appendChild(img); renderFields();
        };
        reader.readAsDataURL(file);
    }

    async function saveData() {
        const st = document.getElementById('status-info');
        st.innerText = "GÜNCELLENİYOR..."; st.style.display = "block";
        try {
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg'));
            const b64 = btoa(unescape(encodeURIComponent(svgText)));
            await fetch(WORKER_URL, {
                method: "PUT",
                headers: {"Content-Type": "application/json", "X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value},
                body: JSON.stringify({message: "Pro Update", content: b64, sha: SHA_KEY})
            });
            st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
            setTimeout(() => st.style.display="none", 2000);
        } catch(e) { alert("Kayıt Hatası!"); }
    }
</script>
</body>
</html>
