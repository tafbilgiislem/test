<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor | Stabil Final</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --handle: #3b82f6; }
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Giriş Paneli */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h2 { margin-top: 0; color: #f8fafc; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; font-size: 16px; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .login-card button:hover { opacity: 0.9; }

        #app-container { display: none; height: 100vh; flex-direction: row; width: 100%; }
        @media (max-width: 1023px) { #app-container { flex-direction: column; } }

        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 1023px) { #sidebar { width: 100%; height: 50%; order: 2; border-top: 1px solid var(--border); } }
        
        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); }
        .sidebar-nav { padding: 12px; background: #111827; border-bottom: 1px solid var(--border); }

        /* Ön İzleme Alanı */
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 15px; position: relative; }
        #svg-wrapper { position: relative; background: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; overflow: visible; }

        /* Tutamaçlar */
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .resize-handle { fill: white; stroke: var(--handle); stroke-width: 2; pointer-events: all; z-index: 100; }
        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; border-left: 4px solid transparent; transition: 0.3s; }
        .delete-btn { position: absolute; right: 12px; top: 12px; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 20px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 4px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; }
        .value-badge { background: #0f172a; color: var(--accent); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 6px; }
        
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-info">İŞLEM YAPILIYOR...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Sistem Girişi</h2>
        <input type="password" id="passInput" placeholder="Şifre">
        <button id="loginBtn" onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="control-layer"></svg>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <select id="file-selector" onchange="loadSlide()" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px;">
                <option value="slayt.svg">Slayt 1</option>
                <option value="info.svg">Slayt 2</option>
                <option value="duyuru.svg">Slayt 3</option>
            </select>
            <div style="display:flex; gap:8px;">
                <button onclick="saveData()" style="flex:2; padding:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
                <button onclick="addNewText()" style="flex:1; padding:12px; background:#3b82f6; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ T</button>
                <button onclick="document.getElementById('img-in').click()" style="flex:1; padding:12px; background:#f97316; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ IMG</button>
            </div>
            <input type="file" id="img-in" hidden onchange="addNewImage(this)">
        </div>
        <div id="editor-fields"></div>
    </div>
</div>

<script>
    // --- KONFİGÜRASYON ---
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // Lütfen burayı güncelleyin
    let SHA_KEY = "", SESSION_PASS = "", selectedEl = null, resizingEl = null, activeHandle = null, offset = {x:0, y:0};

    // --- GİRİŞ FONKSİYONU ---
    async function login() {
        const passIn = document.getElementById('passInput');
        if(!passIn.value) { alert("Şifre boş olamaz"); return; }
        SESSION_PASS = passIn.value;
        await loadSlide();
    }

    // Klavye enter desteği
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login();
    });

    // --- SLAYT YÜKLEME ---
    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info');
        st.style.display = "block";
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            if (res.status === 401) { alert("Hatalı Şifre!"); st.style.display="none"; return; }
            const data = await res.json();
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            setTimeout(setupLayers, 300);
            st.style.display = "none";
        } catch(e) { 
            alert("Bağlantı Hatası: " + e.message); 
            st.style.display="none"; 
        }
    }

    function setupLayers() {
        const mainSvg = document.querySelector('#canvas-inner svg');
        const ctrl = document.getElementById('control-layer');
        if (!mainSvg) return;

        const vb = mainSvg.getAttribute("viewBox") || `0 0 ${mainSvg.width.baseVal.value} ${mainSvg.height.baseVal.value}`;
        mainSvg.setAttribute("viewBox", vb);
        ctrl.setAttribute("viewBox", vb);
        
        mainSvg.querySelectorAll('.duzenlenebilir').forEach(el => {
            if(!el.id) el.id = "el_" + Math.random().toString(36).substr(2,9);
        });

        initEngine(mainSvg);
        renderFields();
    }

    // --- EDİTÖR MOTORU (Pointer Events) ---
    function initEngine(svg) {
        const ctrl = document.getElementById('control-layer');

        const getCoords = (e) => {
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const cursorpt = pt.matrixTransform(svg.getScreenCTM().inverse());
            return { x: cursorpt.x, y: cursorpt.y };
        };

        const onDown = (e) => {
            const p = getCoords(e);
            const target = e.target;

            if (target.classList.contains('resize-handle')) {
                resizingEl = document.getElementById(target.dataset.id);
                activeHandle = target.dataset.handleType;
                resizingEl.dataset.startX = p.x;
                resizingEl.dataset.startY = p.y;
                resizingEl.dataset.startElX = parseFloat(resizingEl.getAttribute("x")) || 0;
                resizingEl.dataset.startElY = parseFloat(resizingEl.getAttribute("y")) || 0;
                resizingEl.dataset.startW = resizingEl.tagName === "image" ? parseFloat(resizingEl.getAttribute("width")) : resizingEl.getBBox().width;
                resizingEl.dataset.startH = resizingEl.tagName === "image" ? parseFloat(resizingEl.getAttribute("height")) : resizingEl.getBBox().height;
                resizingEl.dataset.startSize = parseFloat(window.getComputedStyle(resizingEl).fontSize);
                e.stopPropagation(); return;
            }

            const el = target.closest('.duzenlenebilir');
            if (el) {
                selectedEl = el;
                offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0);
                offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0);
                updateUI(el);
                
                // Sidebar odaklanma
                document.querySelectorAll('.field-box').forEach(f => f.style.borderColor = "var(--border)");
                const box = document
