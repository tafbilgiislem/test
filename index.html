<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzaktan SVG Düzenleyici</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #svg-container { border: 1px solid #ccc; width: 600px; height: 400px; margin-bottom: 20px; }
  label { display: block; margin-top: 10px; }
  input { width: 300px; padding: 5px; margin-top: 5px; }
  button { margin-top: 10px; padding: 5px 10px; cursor: pointer; }
</style>
</head>
<body>

<h1>Uzaktan SVG Düzenleyici</h1>

<div id="svg-container">
  <!-- Buraya SVG yüklenecek -->
</div>

<form id="edit-form">
  <label>Başlık: <input type="text" id="title-input"></label>
  <label>Alt Başlık: <input type="text" id="subtitle-input"></label>
  <label>Alt Bilgi: <input type="text" id="footer-input"></label>
  <button type="button" id="update-btn">Güncelle</button>
</form>

<script>
// ***** BURAYI KENDİ RAW SVG URL’İNLE DEĞİŞTİR *****
const svgURL = "https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg";

const container = document.getElementById("svg-container");

// SVG’yi fetch edip DOM’a koy
fetch(svgURL)
  .then(res => res.text())
  .then(svgText => {
    container.innerHTML = svgText;
  })
  .catch(err => {
    console.error("SVG yüklenemedi:", err);
    container.innerHTML = "<p>SVG yüklenemedi.</p>";
  });

// Metinleri güncelle
document.getElementById("update-btn").addEventListener("click", () => {
  const svg = container.querySelector("svg");
  if (!svg) return;

  const titleElem = svg.getElementById("slide-title");
  const subtitleElem = svg.getElementById("slide-subtitle");
  const footerElem = svg.getElementById("footer-text");

  const titleText = document.getElementById("title-input").value;
  const subtitleText = document.getElementById("subtitle-input").value;
  const footerText = document.getElementById("footer-input").value;

  if (titleElem && titleText) titleElem.textContent = titleText;
  if (subtitleElem && subtitleText) subtitleElem.textContent = subtitleText;
  if (footerElem && footerText) footerElem.textContent = footerText;
});
</script>

</body>
</html>
