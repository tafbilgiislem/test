<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Editor | Metin & Köşe Düzeltmesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Montserrat:wght@800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --handle-move: #3b82f6; --handle-rotate: #f59e0b; --handle-radius: #ec4899; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; overflow: hidden; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overscroll-behavior-y: none; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; font-size: 16px; outline: none; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .login-card button:hover { opacity: 0.9; }

        #app-container { display: none; height: 100%; width: 100%; flex-direction: row; }
        
        #sidebar { width: 360px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; z-index: 100; }
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 15px; position: relative; height: 100%; touch-action: none; }

        @media (max-width: 1023px) { 
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-top: 1px solid var(--border); border-left: none; order: 2; }
            #main-view { width: 100%; height: 50%; order: 1; padding: 5px; }
        }
        
        .sidebar-nav { padding: 15px; background: #111827; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #editor-fields { flex: 1; min-height: 0; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); padding-bottom: 80px; touch-action: pan-y; }

        #svg-wrapper { position: relative; background: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px black; touch-action: none; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; overflow: visible; }

        .duzenlenebilir { cursor: move; pointer-events: all; }
        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: visible; }
        
        .handle { fill: white; stroke-width: 2; pointer-events: all; transition: transform 0.2s; }
        .handle:hover { transform: scale(1.3); }
        .handle-resize { stroke: var(--handle-move); cursor: nwse-resize; }
        .handle-rotate { stroke: var(--handle-rotate); cursor: crosshair; fill: var(--handle-rotate); }
        .handle-radius { stroke: var(--handle-radius); cursor: ns-resize; fill: var(--handle-radius); }

        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; border-left: 4px solid transparent; transition: 0.3s; }
        .field-box.active { border-left-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .delete-btn { position: absolute; right: 12px; top: 12px; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 20px; }
        
        .tool-title { font-size: 13px; color: #f8fafc; font-weight: bold; margin-top: 15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-top: 1px solid var(--border); padding-top: 15px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 4px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; letter-spacing: 0.5px; }
        .value-badge { background: #0f172a; color: var(--accent); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 6px; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 10px; margin-top: 5px; outline: none; }
        
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="status-info">İşlem Yapılıyor...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Sistem Girişi</h2>
        <input type="password" id="passInput" placeholder="Şifre">
        <button id="loginBtn">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="control-layer"></svg>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <select id="file-selector" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px; border:1px solid #334155; outline:none;">
                <option value="slayt.svg">Ana Slayt</option>
                <option value="info.svg">Kampanya</option>
                <option value="duyuru.svg">Duyuru</option>
            </select>
            <div style="display:flex; gap:8px;">
                <button id="saveBtn" style="flex:2; padding:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
                <button id="addTextBtn" style="flex:1; padding:12px; background:#3b82f6; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">+ YAZI</button>
                <button id="addImgBtn" style="flex:1; padding:12px; background:#f97316; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">+ RESİM</button>
            </div>
            <input type="file" id="img-in" hidden>
        </div>
        <div id="editor-fields"></div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // Lütfen GITHUB/WORKER URL'nizi buraya yapıştırın.
    let SHA_KEY = "", SESSION_PASS = "";
    let selectedEl = null, resizingEl = null, rotatingEl = null, radiusingEl = null, activeHandle = null;
    let offset = {x:0, y:0}, startP = {x:0, y:0}, startData = {};

    window.updateEditorUI = null;

    // === GİRİŞ ===
    const login = async () => {
        const passVal = document.getElementById('passInput').value;
        if(!passVal) { alert("Şifre girin!"); return; }
        SESSION_PASS = passVal;
        await loadSlide();
    };
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    document.getElementById('file-selector').addEventListener('change', loadSlide);

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info');
        st.innerText = file.toUpperCase() + " YÜKLENİYOR...";
        st.style.display = "block";
        
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            if (res.status === 401) { alert("Şifre Hatalı!"); st.style.display="none"; return; }
            const data = await res.json();
            SHA_KEY = data.sha;
            
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            setTimeout(setupLayers, 200);
            st.style.display = "none";
        } catch(e) { alert("Bağlantı Hatası!"); st.style.display="none"; }
    }

    // === INKSCAPE BEZIER ALGORİTMASI ===
    function describeRoundedRect(r, s, x, y, w, h) {
        if (r <= 0) return `M ${x} ${y} H ${x + w} V ${y + h} H ${x} Z`;
        r = Math.min(r, w / 2, h / 2); 
        const angle = Math.PI / 4; 
        const handleLength = r * (1 - s); 
        const kappa = (4 * handleLength * Math.tan(angle)) / 3; 

        const pts = [
            [x + r, y], [x + w - r, y],
            [x + w, y + r], [x + w, y + h - r],
            [x + w - r, y + h], [x + r, y + h],
            [x, y + h - r], [x, y + r]
        ];

        return `M ${pts[0][0]} ${pts[0][1]} 
                L ${pts[1][0]} ${pts[1][1]} 
                C ${pts[1][0] + kappa} ${pts[1][1]} ${pts[2][0]} ${pts[2][1] - kappa} ${pts[2][0]} ${pts[2][1]} 
                L ${pts[3][0]} ${pts[3][1]} 
                C ${pts[3][0]} ${pts[3][1] + kappa} ${pts[4][0] + kappa} ${pts[4][1]} ${pts[4][0]} ${pts[4][1]} 
                L ${pts[5][0]} ${pts[5][1]} 
                C ${pts[5][0] - kappa} ${pts[5][1]} ${pts[6][0]} ${pts[6][1] + kappa} ${pts[6][0]} ${pts[6][1]} 
                L ${pts[7][0]} ${pts[7][1]} 
                C ${pts[7][0]} ${pts[7][1] - kappa} ${pts[0][0] - kappa} ${pts[0][1]} ${pts[0][0]} ${pts[0][1]} 
                Z`;
    }

    window.applySquircle = function(el) {
        if (el.tagName !== 'image') return;
        let rx = parseFloat(el.dataset.rx) || 0;
        let sm = parseFloat(el.dataset.smoothing);
        if (isNaN(sm)) sm = 0.5;

        const x = parseFloat(el.getAttribute('x')) || 0;
        const y = parseFloat(el.getAttribute('y')) || 0;
        const w = parseFloat(el.getAttribute('width')) || 0;
        const h = parseFloat(el.getAttribute('height')) || 0;

        const svg = document.querySelector('#canvas-inner svg');
        let defs = svg.querySelector('defs');
        if (!defs) { defs = document.createElementNS("http://www.w3.org/2000/svg", "defs"); svg.prepend(defs); }

        const clipId = "clip_" + el.id;
        let clipPath = defs.querySelector("#" + clipId);
        if (!clipPath) {
            clipPath = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
            clipPath.id = clipId;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            clipPath.appendChild(path);
            defs.appendChild(clipPath);
            el.setAttribute("clip-path", `url(#${clipId})`);
        }

        const pathEl = clipPath.querySelector('path');
        pathEl.setAttribute("d", describeRoundedRect(rx, sm, x, y, w, h));
    };

    function setupLayers() {
        const mainSvg = document.querySelector('#canvas-inner svg');
        const ctrl = document.getElementById('control-layer');
        if (!mainSvg) return;

        const vb = mainSvg.getAttribute("viewBox") || `0 0 1920 1080`;
        mainSvg.setAttribute("viewBox", vb);
        ctrl.setAttribute("viewBox", vb);
        
        mainSvg.querySelectorAll('.duzenlenebilir').forEach(el => {
            if(!el.id) el.id = "el_" + Math.random().toString(36).substr(2,9);
            if(el.tagName === 'image') {
                if(!el.dataset.smoothing) el.dataset.smoothing = "0.5";
                window.applySquircle(el);
            }
        });

        initEngine(mainSvg);
        renderFields();
    }

    // === PRO EDİTÖR MOTORU ===
    function initEngine(svg) {
        const wrapper = document.getElementById('svg-wrapper');
        const ctrl = document.getElementById('control-layer');
        
        const getCoords = (e) => {
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const ctm = svg.getScreenCTM();
            if (!ctm) return { x: 0, y: 0 };
            const cursorpt = pt.matrixTransform(ctm.inverse());
            return { x: cursorpt.x, y: cursorpt.y };
        };

        wrapper.onpointerdown = (e) => {
            const p = getCoords(e);
            const target = e.target;

            if (target.classList.contains('handle')) {
                const el = document.getElementById(target.dataset.id);
                if (!el) return;

                startP = p;
                startData = {
                    x: parseFloat(el.getAttribute("x")) || 0,
                    y: parseFloat(el.getAttribute("y")) || 0,
                    w: parseFloat(el.getAttribute("width")) || 0,
                    h: parseFloat(el.getAttribute("height")) || 0,
                    rx: parseFloat(el.dataset.rx) || 0,
                    sm: parseFloat(el.dataset.smoothing) || 0.5,
                    fontSize: parseFloat(el.getAttribute("font-size")) || parseFloat(window.getComputedStyle(el).fontSize) || 60
                };

                if (target.classList.contains('handle-resize')) { resizingEl = el; activeHandle = target.dataset.handle; }
                else if (target.classList.contains('handle-rotate')) { rotatingEl = el; }
                else if (target.classList.contains('handle-radius')) { radiusingEl = el; }
                
                try { wrapper.setPointerCapture(e.pointerId); } catch(err){}
                e.preventDefault(); e.stopPropagation(); return;
            }

            const el = target.closest('.duzenlenebilir');
            if (el) {
                selectedEl = el;
                offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0);
                offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0);
                updateUI(el);
                
                document.querySelectorAll('.field-box').forEach(f => f.classList.remove('active'));
                const box = document.getElementById('box-' + el.id);
                if(box) { box.classList.add('active'); box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
                
                try { wrapper.setPointerCapture(e.pointerId); } catch(err){}
            } else {
                ctrl.innerHTML = ""; 
            }
        };

        window.onpointermove = (e) => {
            if (!selectedEl && !resizingEl && !rotatingEl && !radiusingEl) return;
            e.preventDefault(); 
            const p = getCoords(e);
            const dx = p.x - startP.x;
            const dy = p.y - startP.y;

            if (resizingEl) {
                let { x, y, w, h } = startData;
                if (activeHandle === 'br') { w += dx; h += dy; }
                else if (activeHandle === 'bl') { x += dx; w -= dx; h += dy; }
                else if (activeHandle === 'tr') { y += dy; w += dx; h -= dy; }
                else if (activeHandle === 'tl') { x += dx; y += dy; w -= dx; h -= dy; }

                if (resizingEl.tagName === "image") {
                    if (w > 10 && h > 10) {
                        resizingEl.setAttribute("x", x); resizingEl.setAttribute("y", y);
                        resizingEl.setAttribute("width", w); resizingEl.setAttribute("height", h);
                        window.applySquircle(resizingEl);
                    }
                } else {
                    const ns = Math.max(5, startData.fontSize + dx/2);
                    resizingEl.style.fontSize = ns + "px"; 
                    resizingEl.setAttribute("font-size", ns); // Garanti Kayıt Özelliği
                }
                updateUI(resizingEl); syncSliders(resizingEl);
            } 
            else if (rotatingEl) {
                const bbox = rotatingEl.getBBox();
                const cx = bbox.x + bbox.width / 2;
                const cy = bbox.y + bbox.height / 2;
                const angle = Math.atan2(p.y - cy, p.x - cx) * (180 / Math.PI) + 90; 
                rotatingEl.setAttribute("transform", `rotate(${angle} ${cx} ${cy})`);
                updateUI(rotatingEl);
            }
            else if (radiusingEl && radiusingEl.tagName === "image") {
                const newRx = Math.max(0, Math.min(startData.w/2, startData.h/2, startData.rx + dy));
                radiusingEl.dataset.rx = newRx;
                window.applySquircle(radiusingEl);
                updateUI(radiusingEl); syncSliders(radiusingEl);
            }
            else if (selectedEl) {
                selectedEl.setAttribute("x", p.x - offset.x);
                selectedEl.setAttribute("y", p.y - offset.y);
                if(selectedEl.tagName === 'image') window.applySquircle(selectedEl);
                updateUI(selectedEl);
            }
        };

        const release = (e) => { 
            try { wrapper.releasePointerCapture(e.pointerId); } catch(err){}
            selectedEl = null; resizingEl = null; rotatingEl = null; radiusingEl = null; activeHandle = null; 
        };
        window.onpointerup = release;
        window.onpointercancel = release;

        // === SEÇİM KUTUSU ÇİZİMİ ===
        function updateUI(el) {
            ctrl.innerHTML = "";
            const b = el.getBBox();
            const transform = el.getAttribute("transform") || "";
            
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", transform);
            ctrl.appendChild(g);

            // Çerçeve (Resimse Bezier, Metinse Kare)
            if (el.tagName === 'image') {
                const rPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const currentRx = parseFloat(el.dataset.rx) || 0;
                const currentSm = parseFloat(el.dataset.smoothing) || 0.5;
                rPath.setAttribute("d", describeRoundedRect(currentRx, currentSm, b.x, b.y, b.width, b.height));
                rPath.setAttribute("fill", "none"); 
                rPath.setAttribute("stroke", "var(--handle-move)"); 
                rPath.setAttribute("stroke-width", "2"); 
                rPath.setAttribute("stroke-dasharray", "6,4");
                g.appendChild(rPath);
            } else {
                const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                r.setAttribute("x", b.x); r.setAttribute("y", b.y);
                r.setAttribute("width", b.width); r.setAttribute("height", b.height);
                r.setAttribute("fill", "none"); r.setAttribute("stroke", "var(--handle-move)"); 
                r.setAttribute("stroke-width", "2"); r.setAttribute("stroke-dasharray", "6,4");
                g.appendChild(r);
            }

            const s = 24; 

            // 4 Köşe
            const corners = [
                { id: 'tl', x: b.x, y: b.y, cur: 'nwse-resize' }, 
                { id: 'tr', x: b.x + b.width, y: b.y, cur: 'nesw-resize' },
                { id: 'bl', x: b.x, y: b.y + b.height, cur: 'nesw-resize' }, 
                { id: 'br', x: b.x + b.width, y: b.y + b.height, cur: 'nwse-resize' }
            ];
            corners.forEach(c => {
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", c.x - s/2); rect.setAttribute("y", c.y - s/2);
                rect.setAttribute("width", s); rect.setAttribute("height", s);
                rect.setAttribute("class", "handle handle-resize"); rect.dataset.id = el.id; rect.dataset.handle = c.id;
                rect.style.cursor = c.cur;
                g.appendChild(rect);
            });

            if (el.tagName === "image") {
                // Döndürme Tutamacı
                const rotY = b.y - 40;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", b.x + b.width / 2); line.setAttribute("y1", b.y);
                line.setAttribute("x2", b.x + b.width / 2); line.setAttribute("y2", rotY);
                line.setAttribute("stroke", "var(--handle-rotate)"); line.setAttribute("stroke-width", "2");
                g.appendChild(line);

                const rotH = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                rotH.setAttribute("cx", b.x + b.width / 2); rotH.setAttribute("cy", rotY);
                rotH.setAttribute("r", s/2.5);
                rotH.setAttribute("class", "handle handle-rotate"); rotH.dataset.id = el.id;
                g.appendChild(rotH);

                // Köşe Yumuşatma Tutamacı (Aşağı hareket eder)
                const currentRx = parseFloat(el.dataset.rx) || 0;
                const radH = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                radH.setAttribute("cx", b.x + b.width); 
                radH.setAttribute("cy", b.y + currentRx); 
                radH.setAttribute("r", s/2.5);
                radH.setAttribute("class", "handle handle-radius"); radH.dataset.id = el.id;
                g.appendChild(radH);
            }
        }
        window.updateEditorUI = updateUI; 
    }

    // === SİDEBAR ===
    function syncSliders(el) {
        const i = Array.from(document.querySelectorAll('.duzenlenebilir')).indexOf(el);
        if (i === -1) return;
        if (el.tagName === 'text') {
            const fs = parseFloat(el.getAttribute("font-size")) || parseInt(window.getComputedStyle(el).fontSize) || 60;
            const slider = document.getElementById(`fs-slider-${i}`);
            if(slider) slider.value = fs;
            const badge = document.getElementById(`val-fs-${i}`);
            if(badge) badge.innerText = fs + "px";
        } else {
            const w = Math.round(parseFloat(el.getAttribute("width")));
            const h = Math.round(parseFloat(el.getAttribute("height")));
            const rx = Math.round(parseFloat(el.dataset.rx) || 0); 
            const sm = parseFloat(el.dataset.smoothing) || 0.5;
            
            const ws = document.getElementById(`w-slider-${i}`), hs = document.getElementById(`h-slider-${i}`);
            const rs = document.getElementById(`r-slider-${i}`), ss = document.getElementById(`s-slider-${i}`);
            
            if(ws) { ws.value = w; document.getElementById(`val-w-${i}`).innerText = w + "px"; }
            if(hs) { hs.value = h; document.getElementById(`val-h-${i}`).innerText = h + "px"; }
            if(rs) { rs.value = rx; rs.max = Math.min(w/2, h/2); document.getElementById(`val-r-${i}`).innerText = rx + "px"; }
            if(ss) { ss.value = sm; document.getElementById(`val-s-${i}`).innerText = sm.toFixed(2); }
        }
    }

    function renderFields() {
        const f = document.getElementById('editor-fields');
        f.innerHTML = "";
        document.querySelectorAll('.duzenlenebilir').forEach((el, i) => {
            const b = document.createElement('div');
            b.className = 'field-box'; b.id = 'box-' + el.id;
            const col = el.getAttribute('fill') || el.style.fill || "#ffffff";
            
            let html = `<span class="delete-btn" onclick="if(confirm('Silinecek?')){ document.getElementById('${el.id}').remove(); renderFields(); document.getElementById('control-layer').innerHTML=''; }">×</span>`;
            html += `<div style="font-size:11px; color:#3b82f6; font-weight:bold; letter-spacing:0.5px;">${el.tagName.toUpperCase()} #${i+1}</div>`;

            if (el.tagName === 'text') {
                const fs = parseFloat(el.getAttribute("font-size")) || parseInt(window.getComputedStyle(el).fontSize) || 60;
                html += `
                    <input type="text" value="${el.textContent}" oninput="document.getElementById('${el.id}').textContent=this.value" style="width:100%; padding:12px; background:#000; color:#fff; border:1px solid #444; border-radius:8px; margin-top:8px;">
                    <div class="label-row"><span class="label-text">YAZI BOYUTU</span><span class="value-badge" id="val-fs-${i}">${fs}px</span></div>
                    <input type="range" id="fs-slider-${i}" min="10" max="600" value="${fs}" oninput="document.getElementById('${el.id}').style.fontSize=this.value+'px'; document.getElementById('${el.id}').setAttribute('font-size', this.value); document.getElementById('val-fs-${i}').innerText=this.value+'px'; if(window.updateEditorUI) window.updateEditorUI(document.getElementById('${el.id}'));">
                    <div class="label-row"><span class="label-text">RENK</span></div>
                    <input type="color" value="${safeColor(col)}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('fill', this.value); t.style.fill=this.value;" style="width:50px; height:45px; cursor:pointer; border:none; background:none;">
                `;
            } else {
                const w = parseFloat(el.getAttribute("width")) || 200, h = parseFloat(el.getAttribute("height")) || 200;
                const rx = parseFloat(el.dataset.rx) || 0, sm = parseFloat(el.dataset.smoothing) || 0.5; 
                html += `
                    <div class="label-row"><span class="label-text">GENİŞLİK</span><span class="value-badge" id="val-w-${i}">${Math.round(w)}px</span></div>
                    <input type="range" id="w-slider-${i}" min="10" max="3000" value="${w}" oninput="const img=document.getElementById('${el.id}'); img.setAttribute('width', this.value); window.applySquircle(img); document.getElementById('val-w-${i}').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);">
                    
                    <div class="label-row"><span class="label-text">YÜKSEKLİK</span><span class="value-badge" id="val-h-${i}">${Math.round(h)}px</span></div>
                    <input type="range" id="h-slider-${i}" min="10" max="3000" value="${h}" oninput="const img=document.getElementById('${el.id}'); img.setAttribute('height', this.value); window.applySquircle(img); document.getElementById('val-h-${i}').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);">
                    
                    <div class="tool-title">GELİŞMİŞ KÖŞE ARAÇLARI</div>
                    
                    <div class="label-row"><span class="label-text">KÖŞE YARIÇAPI (RADIUS)</span><span class="value-badge" id="val-r-${i}">${Math.round(rx)}px</span></div>
                    <input type="range" id="r-slider-${i}" min="0" max="${Math.min(w/2, h/2)}" value="${rx}" oninput="const img=document.getElementById('${el.id}'); img.dataset.rx=this.value; window.applySquircle(img); document.getElementById('val-r-${i}').innerText=Math.round(this.value)+'px'; if(window.updateEditorUI) window.updateEditorUI(img);">
                    
                    <div class="label-row"><span class="label-text">KÖŞE YUMUŞATMA (SMOOTHING)</span><span class="value-badge" id="val-s-${i}">${sm.toFixed(2)}</span></div>
                    <input type="range" id="s-slider-${i}" min="0" max="1" step="0.01" value="${sm}" oninput="const img=document.getElementById('${el.id}'); img.dataset.smoothing=this.value; window.applySquircle(img); document.getElementById('val-s-${i}').innerText=parseFloat(this.value).toFixed(2); if(window.updateEditorUI) window.updateEditorUI(img);">
                `;
            }
            b.innerHTML = html; f.appendChild(b);
        });
    }

    function safeColor(c) {
        if(!c) return "#ffffff";
        if(c.length === 4 && c.startsWith('#')) return "#" + c[1] + c[1] + c[2] + c[2] + c[3] + c[3];
        return c.startsWith('#') && c.length === 7 ? c : "#ffffff";
    }

    // === METİN VE RESİM EKLEME ===
    document.getElementById('saveBtn').onclick = saveData;
    document.getElementById('addTextBtn').onclick = addNewText;
    document.getElementById('addImgBtn').onclick = () => document.getElementById('img-in').click();
    document.getElementById('img-in').onchange = (e) => addNewImage(e.target);

    // KESİN ÇÖZÜM: Metinler artık BEYAZ ve tam ORTADA, kaybolmasını engelleyen attributelar ile eklendi
    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg');
        if(!svg) return;
        const viewBox = svg.viewBox.baseVal;
        const cx = viewBox.width ? viewBox.width / 2 : 500;
        const cy = viewBox.height ? viewBox.height / 2 : 500;

        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "txt_" + Date.now(); 
        t.setAttribute("class", "duzenlenebilir");
        t.setAttribute("x", cx); 
        t.setAttribute("y", cy); 
        t.setAttribute("fill", "#ffffff"); // Koyuda kaybolmasın diye beyaz
        t.setAttribute("font-size", "80"); // Özellik garantisi
        t.style.fontSize = "80px"; 
        t.style.fontFamily = "sans-serif"; 
        t.textContent = "YENİ METİN";
        
        svg.appendChild(t); 
        renderFields(); 
        setupLayers();
    }

    function addNewImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg');
            const viewBox = svg.viewBox.baseVal;
            const cx = viewBox.width ? (viewBox.width / 2) - 150 : 100;
            const cy = viewBox.height ? (viewBox.height / 2) - 150 : 100;
            
            const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "img_" + Date.now(); img.setAttribute("class", "duzenlenebilir");
            img.setAttribute("x", cx); img.setAttribute("y", cy);
            img.setAttribute("width", 300); img.setAttribute("height", 300);
            img.dataset.rx = "0"; img.dataset.smoothing = "0.5";
            img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            
            svg.appendChild(img); renderFields(); setupLayers();
        };
        reader.readAsDataURL(file);
    }

    async function saveData() {
        const st = document.getElementById('status-info');
        st.innerText = "KAYDEDİLİYOR..."; st.style.display = "block";
        try {
            document.getElementById('control-layer').innerHTML = ""; // Kayıttan önce kutuyu temizle
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg'));
            const b64 = btoa(unescape(encodeURIComponent(svgText)));
            await fetch(WORKER_URL, {
                method: "PUT",
                headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value},
                body: JSON.stringify({message: "Pro Text & Bezier Fix", content: b64, sha: SHA_KEY})
            });
            st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
            setTimeout(() => st.style.display="none", 2000);
        } catch(e) { alert("Hata!"); st.style.display="none"; }
    }
</script>
</body>
</html>
