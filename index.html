<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor | Fix Edition</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --handle: #ffffff; }
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Giriş ve Panel Stilleri */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 30px; border-radius: 16px; width: 320px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }

        #app-container { display: none; height: 100vh; flex-direction: row; }
        @media (max-width: 1023px) { #app-container { flex-direction: column; } }

        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 1023px) { #sidebar { width: 100%; height: 50%; order: 2; } #main-view { height: 50%; order: 1; } }

        .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); background: #111827; }
        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); }
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; position: relative; }

        /* Canvas Alanı */
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }
        #svg-wrapper { background: white; box-shadow: 0 0 30px black; position: relative; }
        svg { display: block; overflow: visible; }
        
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .resize-handle { fill: white; stroke: #3b82f6; stroke-width: 2; cursor: nwse-resize; pointer-events: all; }
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 8px; z-index: 11000; display: none; }
        .delete-btn { position: absolute; right: 8px; top: 8px; color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-info">BEKLEYİN...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Sistem Girişi</h2>
        <input type="password" id="passInput" placeholder="Şifre">
        <button onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="control-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
        </div>
    </div>
    <div id="sidebar">
        <div class="sidebar-top">
            <select id="file-selector" onchange="loadSlide()" style="width:100%; padding:8px; background:#000; color:#fff; border-radius:5px; margin-bottom:10px;">
                <option value="slayt.svg">Slayt 1</option>
                <option value="info.svg">Slayt 2</option>
            </select>
            <div style="display:flex; gap:5px;">
                <button onclick="saveData()" style="flex:2; padding:10px; background:var(--accent); border:none; border-radius:5px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
                <button onclick="addNewText()" style="flex:1; padding:10px; background:#3b82f6; border:none; border-radius:5px; color:#fff; cursor:pointer;">+ T</button>
                <button onclick="document.getElementById('img-in').click()" style="flex:1; padding:10px; background:#f97316; border:none; border-radius:5px; color:#fff; cursor:pointer;">+ IMG</button>
            </div>
            <input type="file" id="img-in" hidden onchange="addNewImage(this)">
        </div>
        <div id="editor-fields"></div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // BURAYI GÜNCELLEYİN
    let SHA_KEY = "", SESSION_PASS = "", selectedEl = null, resizingEl = null, offset = {x:0, y:0};

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;
        SESSION_PASS = pass;
        await loadSlide();
    }

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info');
        st.style.display = "block";
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            const data = await res.json();
            SHA_KEY = data.sha;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            const mainSvg = document.querySelector('#canvas-inner svg');
            document.getElementById('control-layer').setAttribute("viewBox", mainSvg.getAttribute("viewBox"));
            mainSvg.querySelectorAll('text, image').forEach(el => {
                if(!el.id) el.id = "id_" + Math.random().toString(36).substr(2,9);
                el.classList.add('duzenlenebilir');
            });
            initEngine();
            renderFields();
            st.style.display = "none";
        } catch(e) { alert("Hata oluştu!"); }
    }

    function initEngine() {
        const svg = document.querySelector('#canvas-inner svg');
        const ctrl = document.getElementById('control-layer');

        const getMousePos = (e) => {
            const rect = svg.getBoundingClientRect();
            const vb = svg.viewBox.baseVal;
            const x = (e.clientX - rect.left) * (vb.width / rect.width);
            const y = (e.clientY - rect.top) * (vb.height / rect.height);
            // Infinity kontrolü
            return { 
                x: isFinite(x) ? x : 0, 
                y: isFinite(y) ? y : 0 
            };
        };

        const start = (e) => {
            if(e.target.classList.contains('resize-handle')) {
                resizingEl = document.getElementById(e.target.dataset.id);
                e.stopPropagation(); return;
            }
            const el = e.target.closest('.duzenlenebilir');
            if(el) {
                selectedEl = el;
                const p = getMousePos(e);
                offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0);
                offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0);
                updateUI(el);
            } else { ctrl.innerHTML = ""; }
        };

        const move = (e) => {
            const p = getMousePos(e);
            if(resizingEl) {
                const ex = parseFloat(resizingEl.getAttribute("x")) || 0;
                const ey = parseFloat(resizingEl.getAttribute("y")) || 0;
                if(resizingEl.tagName === "image") {
                    resizingEl.setAttribute("width", Math.max(10, p.x - ex));
                    resizingEl.setAttribute("height", Math.max(10, p.y - ey));
                } else {
                    resizingEl.style.fontSize = Math.max(5, p.x - ex) + "px";
                }
                updateUI(resizingEl);
            } else if(selectedEl) {
                selectedEl.setAttribute("x", p.x - offset.x);
                selectedEl.setAttribute("y", p.y - offset.y);
                updateUI(selectedEl);
            }
        };

        const stop = () => { selectedEl = null; resizingEl = null; };

        function updateUI(el) {
            ctrl.innerHTML = "";
            const b = el.getBBox();
            const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            r.setAttribute("x", b.x); r.setAttribute("y", b.y);
            r.setAttribute("width", b.width); r.setAttribute("height", b.height);
            r.setAttribute("fill", "none"); r.setAttribute("stroke", "#3b82f6");
            ctrl.appendChild(r);

            const h = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            h.setAttribute("x", b.x + b.width - 7); h.setAttribute("y", b.y + b.height - 7);
            h.setAttribute("width", 14); h.setAttribute("height", 14);
            h.setAttribute("class", "resize-handle"); h.dataset.id = el.id;
            ctrl.appendChild(h);
        }

        svg.addEventListener('pointerdown', start);
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', stop);
    }

    function renderFields() {
        const f = document.getElementById('editor-fields');
        f.innerHTML = "";
        document.querySelectorAll('.duzenlenebilir').forEach((el, i) => {
            const b = document.createElement('div');
            b.className = 'field-box';
            b.innerHTML = `
                <span class="delete-btn" onclick="document.getElementById('${el.id}').remove(); renderFields();">×</span>
                <div style="font-size:10px; color:#888; margin-bottom:5px;">${el.tagName.toUpperCase()}</div>
                ${el.tagName === 'text' ? `<input type="text" value="${el.textContent}" oninput="document.getElementById('${el.id}').textContent=this.value" style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#000; color:#fff;">` : ''}
                <div style="margin-top:8px;">
                    ${el.tagName === 'text' ? `<input type="color" value="#ffffff" oninput="document.getElementById('${el.id}').setAttribute('fill', this.value)">` : ''}
                    <small style="color:#666; margin-left:10px;">Ekranda üzerine tıklayıp köşeden çekin</small>
                </div>`;
            f.appendChild(b);
        });
    }

    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg');
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "t" + Date.now(); t.classList.add("duzenlenebilir");
        t.setAttribute("x", 50); t.setAttribute("y", 50); t.setAttribute("fill", "#ffffff");
        t.style.fontSize = "40px"; t.textContent = "YENİ METİN";
        svg.appendChild(t); renderFields();
    }

    function addNewImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg');
            const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "i" + Date.now(); img.classList.add("duzenlenebilir");
            img.setAttribute("x", 50); img.setAttribute("y", 50);
            img.setAttribute("width", 200); img.setAttribute("height", 200);
            img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            svg.appendChild(img); renderFields();
        };
        reader.readAsDataURL(file);
    }

    async function saveData() {
        const st = document.getElementById('status-info');
        st.innerText = "KAYDEDİLİYOR..."; st.style.display = "block";
        try {
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg'));
            const b64 = btoa(unescape(encodeURIComponent(svgText)));
            await fetch(WORKER_URL, {
                method: "PUT",
                headers: {"Content-Type": "application/json", "X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value},
                body: JSON.stringify({message: "Update", content: b64, sha: SHA_KEY})
            });
            st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
            setTimeout(() => st.style.display="none", 2000);
        } catch(e) { alert("Hata!"); }
    }
</script>
</body>
</html>
