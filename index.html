<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Editor | Professional Corner Controls</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Montserrat:wght@800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #10b981; 
            --bg: #0f172a; 
            --panel: #1e293b; 
            --border: #334155; 
            --handle-node: #3b82f6; 
            --handle-corner: #ec4899; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: none; 
        }

        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h1 { margin-top: 0; font-size: 24px; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; font-size: 16px; outline: none; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; }

        #app-container { display: none; height: 100%; width: 100%; flex-direction: row; }
        
        #sidebar { width: 380px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; z-index: 100; }
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 15px; position: relative; height: 100%; touch-action: none; }

        @media (max-width: 1023px) { 
            #app-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-top: 1px solid var(--border); border-left: none; order: 2; }
            #main-view { width: 100%; height: 50%; order: 1; padding: 5px; }
        }
        
        .sidebar-nav { padding: 15px; background: #111827; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #editor-fields { flex: 1; min-height: 0; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); padding-bottom: 80px; touch-action: pan-y; }

        #svg-wrapper { position: relative; background: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px black; touch-action: none; }
        #canvas-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; overflow: visible; }

        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: visible; }
        
        .handle { fill: white; stroke-width: 2; pointer-events: all; transition: transform 0.2s; }
        .handle-node { stroke: var(--handle-node); cursor: move; }
        .handle-corner { stroke: var(--handle-corner); cursor: crosshair; }

        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        .field-box.active { border-left: 4px solid var(--accent); background: rgba(16, 185, 129, 0.05); }
        .delete-btn { position: absolute; right: 12px; top: 12px; color: #ef4444; cursor: pointer; font-weight: bold; font-size: 20px; }
        
        .tool-title { font-size: 14px; color: #f8fafc; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 4px; }
        .label-text { font-size: 11px; color: #94a3b8; font-weight: bold; }
        .value-badge { background: #0f172a; color: var(--accent); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        input[type="range"] { width: 100%; accent-color: var(--accent); height: 6px; cursor: pointer; }
        
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-info">İşlem Yapılıyor...</div>

<div id="login-screen">
    <div class="login-card">
        <h1>Sistem Girişi</h1>
        <input type="password" id="passInput" placeholder="Şifre">
        <button id="loginBtn">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="control-layer"></svg>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <select id="file-selector" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px; outline:none;">
                <option value="slayt.svg">Örnek Slayt</option>
            </select>
            <div style="display:flex; gap:8px;">
                <button id="saveBtn" style="flex:1; padding:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
            </div>
        </div>
        <div id="editor-fields">
            <div class="field-box" id="corner-tools-panel">
                <div class="tool-title">Gelişmiş Köşe Araçları</div>
                <div id="no-selection-msg" style="font-size: 12px; color: #94a3b8; font-style: italic;">Düzenlenebilir bir yol (path) seçin.</div>
                
                <div id="corner-controls" style="display: none;">
                    <div class="label-row"><span class="label-text">KÖŞE YARIÇAPI (RADIUS)</span><span class="value-badge" id="val-radius">0px</span></div>
                    <input type="range" id="radius-slider" min="0" max="100" value="0">
                    
                    <div class="label-row"><span class="label-text">KÖŞE YUMUŞATMA (SMOOTHING)</span><span class="value-badge" id="val-smoothing">0.00</span></div>
                    <input type="range" id="smoothing-slider" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // GitHub/Worker bağlantısı için URL'nizi güncelleyin
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; 
    let SHA_KEY = "", SESSION_PASS = "";
    let selectedEl = null;

    // Inkscape benzeri bir örnek SVG yolu (Giriş yapıldığında yüklenecek)
    const SAMPLE_SVG = `<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <rect width="1920" height="1080" fill="#f8fafc"/>
        <path d="M 400 300 H 1500 V 700 H 400 Z" fill="#fff" stroke="#10b981" stroke-width="15" class="duzenlenebilir" id="corner-shape"/>
    </svg>`;

    // GİRİŞ İŞLEMLERİ
    const login = async () => {
        const passVal = document.getElementById('passInput').value;
        if(!passVal) { alert("Şifre girin!"); return; }
        SESSION_PASS = passVal;
        
        // Örnek dosya yüklenir (Gerçek bir Worker bağlantısı için loadSlide fonksiyonunu kullanın)
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('app-container').style.display = "flex";
        document.getElementById('canvas-inner').innerHTML = SAMPLE_SVG;
        setupLayers();
    };
    document.getElementById('loginBtn').addEventListener('click', login);

    function setupLayers() {
        const mainSvg = document.querySelector('#canvas-inner svg');
        if (!mainSvg) return;
        
        // Benzersiz ID'ler atanır
        mainSvg.querySelectorAll('.duzenlenebilir').forEach(el => {
            if(!el.id) el.id = "el_" + Math.random().toString(36).substr(2,9);
        });

        initEngine();
    }

    function initEngine() {
        const wrapper = document.getElementById('svg-wrapper');
        
        wrapper.onpointerdown = (e) => {
            const el = e.target.closest('.duzenlenebilir');
            if (el && el.tagName === 'path') {
                selectedEl = el;
                updateCornerPanel(el);
            }
        };

        // Slider kontrolleri
        document.getElementById('radius-slider').oninput = updateCornerShape;
        document.getElementById('smoothing-slider').oninput = updateCornerShape;
    }

    function updateCornerPanel(el) {
        document.getElementById('no-selection-msg').style.display = 'none';
        document.getElementById('corner-controls').style.display = 'block';
        document.getElementById('corner-tools-panel').classList.add('active');
        
        // Mevcut d (path data) özniteliğinden değerleri oku (İleri düzey ayrıştırma gerektirir, örnekte 0 varsayılır)
        document.getElementById('radius-slider').value = 0; 
        document.getElementById('smoothing-slider').value = 0.5;
        document.getElementById('val-radius').innerText = "0px";
        document.getElementById('val-smoothing').innerText = "0.50";
    }

    function updateCornerShape() {
        if (!selectedEl) return;
        
        const radius = parseFloat(document.getElementById('radius-slider').value);
        const smoothing = parseFloat(document.getElementById('smoothing-slider').value);
        
        document.getElementById('val-radius').innerText = `${radius}px`;
        document.getElementById('val-smoothing').innerText = smoothing.toFixed(2);
        
        // Gerçek Inkscape benzeri köşe yumuşatma algoritması (Örnek dikdörtgen için)
        const w = 1100, h = 400; // Örnek şeklin boyutları
        const d = describeRoundedRect(radius, smoothing, 400, 300, w, h);
        selectedEl.setAttribute('d', d);
    }

    // Basit bir yumuşatılmış dikdörtgen yolu oluşturur (Inkscape'in "Bezier corners" etkisini simüle eder)
    function describeRoundedRect(r, s, x, y, w, h) {
        if (r === 0) return `M ${x} ${y} H ${x + w} V ${y + h} H ${x} Z`;
        
        const angle = Math.PI / 4; // 45 derece
        const handleLength = r * (1 - s); // Smoothing ile kontrol handle uzunluğu ayarlanır
        const kappa = (4 * handleLength * Math.tan(angle)) / 3; // Kontrol noktası katsayısı

        const pts = [
            [x + r, y], [x + w - r, y],
            [x + w, y + r], [x + w, y + h - r],
            [x + w - r, y + h], [x + r, y + h],
            [x, y + h - r], [x, y + r]
        ];

        return `M ${pts[0][0]} ${pts[0][1]} 
                L ${pts[1][0]} ${pts[1][1]} 
                C ${pts[1][0] + kappa} ${pts[1][1]} ${pts[2][0]} ${pts[2][1] - kappa} ${pts[2][0]} ${pts[2][1]} 
                L ${pts[3][0]} ${pts[3][1]} 
                C ${pts[3][0]} ${pts[3][1] + kappa} ${pts[4][0] + kappa} ${pts[4][1]} ${pts[4][0]} ${pts[4][1]} 
                L ${pts[5][0]} ${pts[5][1]} 
                C ${pts[5][0] - kappa} ${pts[5][1]} ${pts[6][0]} ${pts[6][1] + kappa} ${pts[6][0]} ${pts[6][1]} 
                L ${pts[7][0]} ${pts[7][1]} 
                C ${pts[7][0]} ${pts[7][1] - kappa} ${pts[0][0] - kappa} ${pts[0][1]} ${pts[0][0]} ${pts[0][1]} 
                Z`;
    }

    async function saveData() {
        // Worker bağlantısı için önceki adımlardaki saveData kodunu kullanın
        alert("Bu örnekte GitHub bağlantısı kapalıdır.");
    }
</script>
</body>
</html>
