<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor | Metin Ekleme & Ultra Hizalama</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Montserrat:wght@800&family=Poppins:wght@700&family=Oswald:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; --snap: #a855f7; --center-snap: #3b82f6; --add: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 16px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 16px; text-align: center; }
        .login-card button { width: 100%; padding: 14px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; }

        #app-container { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        @media (max-width: 1023px) { #app-container { flex-direction: column; } }

        #sidebar { display: flex; flex-direction: column; background: var(--panel); width: 350px; border-right: 1px solid var(--border); flex-shrink: 0; }
        @media (max-width: 1023px) { #sidebar { width: 100%; height: 50vh; order: 2; } #main-view { height: 50vh; order: 1; } }

        .sidebar-top-nav { padding: 12px; border-bottom: 2px solid var(--border); background: #111827; flex-shrink: 0; }
        .nav-row { display: flex; gap: 8px; margin-top: 8px; }
        #file-selector { width: 100%; padding: 10px; border-radius: 8px; background: #000; color: #fff; border: 1px solid var(--border); cursor: pointer; }

        /* Yeni Metin Ekle Butonu */
        #add-text-btn { width: 100%; padding: 10px; background: var(--add); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        #add-text-btn:active { transform: scale(0.95); opacity: 0.8; }

        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.1); }
        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        .text-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 10px; }
        
        .duzenlenebilir { cursor: move; user-select: none; }

        .control-grid { display: grid; grid-template-columns: 1fr 40px; gap: 10px; margin-bottom: 10px; }
        .font-selector { width: 100%; padding: 8px; border-radius: 6px; background: #000; color: #fff; border: 1px solid var(--border); font-size: 13px; }

        #save-btn { flex: 2; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .exit-btn { flex: 1; padding: 12px; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; }

        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; position: relative; }
        #svg-wrapper { background: white; box-shadow: 0 0 40px rgba(0,0,0,0.6); line-height: 0; position: relative; }
        svg { max-width: 100%; height: auto; display: block; overflow: visible; }
        
        .guide-line { stroke: var(--snap); stroke-width: 1; stroke-dasharray: 4; pointer-events: none; }
        .center-line { stroke: var(--center-snap); stroke-width: 1.5; stroke-dasharray: none; pointer-events: none; }

        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); color: white; text-align: center; padding: 8px; font-weight: bold; z-index: 11000; display: none; }
    </style>
</head>
<body>

<div id="status-info">YÜKLENİYOR...</div>

<div id="login-screen">
    <div class="login-card">
        <h1>Sistem Girişi</h1>
        <input type="password" id="passInput" placeholder="Şifre">
        <button onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="guide-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></svg>
        </div>
    </div>
    <div id="sidebar">
        <div class="sidebar-top-nav">
            <select id="file-selector" onchange="loadSlide()">
                <option value="slayt.svg">Ana Slayt</option>
                <option value="info.svg">Kampanya</option>
                <option value="duyuru.svg">Duyuru</option>
            </select>
            <div class="nav-row">
                <button id="save-btn" onclick="saveData()">KAYDET</button>
                <button class="exit-btn" onclick="location.reload()">ÇIKIŞ</button>
            </div>
        </div>
        <div id="editor-fields-container" style="display:flex; flex-direction:column; height:100%; overflow:hidden;">
            <div style="padding: 15px 15px 0 15px;">
                <button id="add-text-btn" onclick="addNewText()">+ YENİ METİN EKLE</button>
            </div>
            <div id="editor-fields"></div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev/"; // URL'nizi güncelleyin
    let SHA_KEY = "";
    let SESSION_PASS = "";
    let selectedElement = null;
    let offset = { x: 0, y: 0 };
    const SNAP_THRESHOLD = 8;

    const fonts = [
        { name: "Varsayılan", val: "inherit" },
        { name: "Roboto", val: "'Roboto', sans-serif" },
        { name: "Montserrat", val: "'Montserrat', sans-serif" },
        { name: "Poppins", val: "'Poppins', sans-serif" },
        { name: "Oswald", val: "'Oswald', sans-serif" },
        { name: "Arial", val: "Arial, sans-serif" }
    ];

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;
        SESSION_PASS = pass;
        await loadSlide();
    }

    async function loadSlide() {
        const fileName = document.getElementById('file-selector').value;
        const status = document.getElementById('status-info');
        status.innerText = fileName.toUpperCase() + " YÜKLENİYOR...";
        status.style.display = "block";
        try {
            const res = await fetch(WORKER_URL, { headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": fileName } });
            if (res.status === 401) { alert("Şifre Hatalı!"); status.style.display="none"; return; }
            const data = await res.json();
            SHA_KEY = data.sha;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            const mainSvg = document.querySelector('#canvas-inner svg');
            const guideLayer = document.getElementById('guide-layer');
            guideLayer.setAttribute("viewBox", mainSvg.getAttribute("viewBox"));

            initDragAndDrop();
            renderFields();
            status.style.display = "none";
        } catch (e) { alert("Bağlantı Hatası!"); status.style.display="none"; }
    }

    // --- YENİ METİN EKLEME FONKSİYONU ---
    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg');
        const viewBox = svg.viewBox.baseVal;
        
        // Benzersiz bir ID oluştur (örneğin: yeni_metin_171234567)
        const newId = "yeni_metin_" + Date.now();
        
        const newText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        newText.setAttribute("id", newId);
        newText.setAttribute("class", "duzenlenebilir");
        newText.setAttribute("x", viewBox.width / 2);
        newText.setAttribute("y", viewBox.height / 2);
        newText.setAttribute("fill", "#ff0000"); // Varsayılan kırmızı
        newText.style.fontSize = "40px";
        newText.style.fontFamily = "'Roboto', sans-serif";
        newText.textContent = "YENİ METİN";
        
        svg.appendChild(newText);
        
        // Paneli yenile ki yeni input kutusu gelsin
        renderFields();
        // Sürükle bırak olaylarını tekrar bağla
        initDragAndDrop();
    }

    function initDragAndDrop() {
        const svg = document.querySelector('#canvas-inner svg');
        const guideLayer = document.getElementById('guide-layer');
        const viewBox = svg.viewBox.baseVal;
        const centerX = viewBox.width / 2;
        const centerY = viewBox.height / 2;

        const start = (e) => {
            const t = e.target.closest('.duzenlenebilir');
            if (t) {
                selectedElement = t;
                const c = getCoords(e);
                offset.x = c.x - (parseFloat(t.getAttribute("x")) || 0);
                offset.y = c.y - (parseFloat(t.getAttribute("y")) || 0);
            }
        };

        const move = (e) => {
            if (selectedElement) {
                e.preventDefault();
                let c = getCoords(e);
                let newX = c.x - offset.x;
                let newY = c.y - offset.y;
                
                const bbox = selectedElement.getBBox();
                const width = bbox.width;
                const height = bbox.height;

                guideLayer.innerHTML = "";

                // Hizalama Noktaları
                const targetsX = [{ val: newX, type: 'left' }, { val: newX + width / 2, type: 'center' }, { val: newX + width, type: 'right' }];
                const targetsY = [{ val: newY, type: 'top' }, { val: newY + height / 2, type: 'center' }, { val: newY + height, type: 'bottom' }];

                if (Math.abs((newX + width / 2) - centerX) < SNAP_THRESHOLD) { newX = centerX - width / 2; showGuide(centerX, 0, centerX, viewBox.height, true); }
                if (Math.abs((newY + height / 2) - centerY) < SNAP_THRESHOLD) { newY = centerY - height / 2; showGuide(0, centerY, viewBox.width, centerY, true); }

                const others = document.querySelectorAll('.duzenlenebilir');
                others.forEach(other => {
                    if (other === selectedElement) return;
                    const ob = other.getBBox();
                    const ox = parseFloat(other.getAttribute("x")) || 0;
                    const oy = parseFloat(other.getAttribute("y")) || 0;

                    const otherAxsX = [ox, ox + ob.width / 2, ox + ob.width];
                    targetsX.forEach(t => {
                        otherAxsX.forEach(ax => {
                            if (Math.abs(t.val - ax) < SNAP_THRESHOLD) {
                                if (t.type === 'left') newX = ax;
                                if (t.type === 'center') newX = ax - width / 2;
                                if (t.type === 'right') newX = ax - width;
                                showGuide(ax, 0, ax, viewBox.height);
                            }
                        });
                    });

                    const otherAxsY = [oy, oy + ob.height / 2, oy + ob.height];
                    targetsY.forEach(t => {
                        otherAxsY.forEach(ay => {
                            if (Math.abs(t.val - ay) < SNAP_THRESHOLD) {
                                if (t.type === 'top') newY = ay;
                                if (t.type === 'center') newY = ay - height / 2;
                                if (t.type === 'bottom') newY = ay - height;
                                showGuide(0, ay, viewBox.width, ay);
                            }
                        });
                    });
                });

                selectedElement.setAttribute("x", newX);
                selectedElement.setAttribute("y", newY);
            }
        };

        function showGuide(x1, y1, x2, y2, isCenter = false) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.classList.add(isCenter ? "center-line" : "guide-line");
            guideLayer.appendChild(line);
        }

        const getCoords = (e) => {
            const CTM = svg.getScreenCTM();
            const touch = e.touches ? e.touches[0] : e;
            return { x: (touch.clientX - CTM.e) / CTM.a, y: (touch.clientY - CTM.f) / CTM.d };
        };

        svg.addEventListener('mousedown', start); svg.addEventListener('touchstart', start, {passive:false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('mouseup', () => { selectedElement = null; guideLayer.innerHTML = ""; }); 
        window.addEventListener('touchend', () => { selectedElement = null; guideLayer.innerHTML = ""; });
    }

    function renderFields() {
        const container = document.getElementById('editor-fields');
        container.innerHTML = "";
        document.querySelectorAll('.duzenlenebilir').forEach((el, i) => {
            const box = document.createElement('div');
            box.className = 'field-box';
            
            // Silme butonu ekle (İsteğe bağlı, eklenen metni silebilirsin)
            const deleteBtn = document.createElement('span');
            deleteBtn.innerHTML = "×";
            deleteBtn.style.cssText = "position:absolute; right:10px; top:5px; color:#555; cursor:pointer; font-size:18px; font-weight:bold;";
            deleteBtn.onclick = () => { if(confirm("Bu metni silmek istiyor musun?")) { el.remove(); renderFields(); }};
            box.appendChild(deleteBtn);

            box.innerHTML += `
                <div style="font-size:10px; color:#94a3b8; font-weight:bold; margin-bottom:8px;">${(el.id || 'ALAN').toUpperCase()}</div>
                <input type="text" class="text-input" value="${el.textContent.trim()}" oninput="document.querySelectorAll('.duzenlenebilir')[${i}].textContent = this.value">
                <div class="control-grid">
                    <select class="font-selector" onchange="document.querySelectorAll('.duzenlenebilir')[${i}].style.fontFamily = this.value">
                        ${fonts.map(f => `<option value="${f.val}" ${el.style.fontFamily === f.val ? 'selected' : ''}>${f.name}</option>`).join('')}
                    </select>
                    <input type="color" style="width:40px; height:40px; border:none; border-radius:6px; cursor:pointer;" 
                        value="${rgbToHex(window.getComputedStyle(el).fill)}" 
                        oninput="const e=document.querySelectorAll('.duzenlenebilir')[${i}]; e.setAttribute('fill', this.value); e.style.setProperty('fill', this.value, 'important');">
                </div>
                <input type="range" min="8" max="250" value="${parseInt(window.getComputedStyle(el).fontSize)}" 
                    oninput="document.querySelectorAll('.duzenlenebilir')[${i}].style.fontSize = this.value+'px'; document.getElementById('v-${i}').innerText = this.value+'px';" 
                    style="width:100%; accent-color:var(--accent);">
                <div style="text-align:right; font-size:9px; color:#555;" id="v-${i}">${parseInt(window.getComputedStyle(el).fontSize)}px</div>
            `;
            container.appendChild(box);
        });
    }

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const p = rgb.match(/\d+/g);
        return "#" + p.map(x => parseInt(x).toString(16).padStart(2, '0')).join('').substring(0, 6);
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const st = document.getElementById('status-info');
        const fileName = document.getElementById('file-selector').value;
        btn.disabled = true; st.innerText = "KAYDEDİLİYOR..."; st.style.display = "block";
        try {
            const svgText = new XMLSerializer().serializeToString(document.querySelector('#canvas-inner svg'));
            const encoded = btoa(unescape(encodeURIComponent(svgText)));
            const res = await fetch(WORKER_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Auth-Key": SESSION_PASS, "X-File-Name": fileName },
                body: JSON.stringify({ message: "New Text and Alignment Update", content: encoded, sha: SHA_KEY })
            });
            if (res.ok) {
                const data = await res.json();
                SHA_KEY = data.content.sha;
                st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
                setTimeout(() => st.style.display = "none", 2000);
            } else alert("Kayıt Hatası!");
        } catch (e) { alert("Hata!"); }
        btn.disabled = false;
    }
</script>
</body>
</html>
