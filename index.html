<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>SVG Editor</title>

</head>

<body>

<h2>SVG Editor</h2>

<div id="svg-container"></div>

<br>

<input id="titleInput" placeholder="Başlık">

<br>

<input id="subtitleInput" placeholder="Alt başlık">

<br><br>

<button onclick="preview()">

Preview

</button>

<button onclick="save()">

Kaydet

</button>

<script>

const workerURL="https://githubtoken.tafbilgiislem.workers.dev/";

const apiKey="SVG_SECRET_12345";

const svgURL="https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg";

// SVG yükleme (cache bypass ile)
async function loadSVG(){

const res=await fetch(

svgURL+"?t="+Date.now()

);

const text=await res.text();

document.getElementById("svg-container").innerHTML=text;

console.log("SVG reload edildi");

}

// sayfa açılınca yükle
loadSVG();


// preview
function preview(){

const svg=document.querySelector("#svg-container svg");

if(!svg){

alert("SVG bulunamadı");

return;

}

const title=svg.getElementById("title");

const subtitle=svg.getElementById("subtitle");

if(title){

title.textContent=

document.getElementById("titleInput").value;

}

if(subtitle){

subtitle.textContent=

document.getElementById("subtitleInput").value;

}

}


// save
async function save(){

const svg=document.querySelector("#svg-container svg");

if(!svg){

alert("SVG yok");

return;

}

try{

console.log("commit gönderiliyor");

const response=await fetch(

workerURL,

{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":apiKey

},

body:JSON.stringify({

svg:svg.outerHTML

})

}

);

const text=await response.text();

console.log(text);

alert(text);

// commit sonrası otomatik reload
setTimeout(()=>{

loadSVG();

},1500);

}
catch(e){

console.log(e);

alert("fetch hata");

}

}

</script>

</body>

</html>
