<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>SVG Editor</title>

</head>

<body>

<h2>SVG Editor</h2>

<div id="svg-container"></div>

<br>

<input id="titleInput" placeholder="Başlık">

<br>

<input id="subtitleInput" placeholder="Alt Başlık">

<br><br>

<button onclick="preview()">

Önizleme

</button>

<button onclick="save()">

Kaydet

</button>

<script>

const workerURL="https://githubtoken.tafbilgiislem.workers.dev";

const apiKey="SVG_SECRET_12345";

// SVG yükle
fetch("https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg")

.then(r=>r.text())

.then(data=>{

document.getElementById("svg-container").innerHTML=data;

console.log("SVG yüklendi");

})

.catch(e=>console.log(e));

// preview
function preview(){

const svg=document.querySelector("svg");

svg.getElementById("title").textContent=

document.getElementById("titleInput").value;

svg.getElementById("subtitle").textContent=

document.getElementById("subtitleInput").value;

console.log("preview ok");

}

// save
async function save(){

try{

const svg=document.querySelector("svg").outerHTML;

console.log("gönderiliyor");

const response=await fetch(workerURL,{

method:"POST",

headers:{

"Content-Type":"application/json",

"x-api-key":"SVG_SECRET_12345"

},

body:JSON.stringify({svg})

});

console.log("status:",response.status);

const text=await response.text();

console.log("cevap:",text);

alert(text);

}

catch(e){

console.log("fetch hata:",e);

alert("fetch hata");

}

}

</script>

</body>

</html>
