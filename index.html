<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzaktan SVG Düzenleyici</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #svg-container { border: 1px solid #ccc; width: 600px; height: 400px; margin-bottom: 20px; }
  label { display: block; margin-top: 10px; }
  input { width: 300px; padding: 5px; margin-top: 5px; }
  button { margin-top: 10px; padding: 5px 10px; cursor: pointer; }
</style>
</head>
<body>

<h1>Uzaktan SVG Düzenleyici</h1>

<div id="svg-container">
  <!-- SVG buraya yüklenecek -->
</div>

<form id="edit-form">
  <label>Başlık: <input type="text" id="title-input"></label>
  <label>Alt Başlık: <input type="text" id="subtitle-input"></label>
  <button type="button" id="update-btn">Güncelle</button>
</form>

<script>
const svgURL = "https://github.com/tafbilgiislem/ypm/blob/main/slayt.svg"; // Burayı kendi repo URL’ine değiştir
const container = document.getElementById("svg-container");

// 1️⃣ SVG dosyasını fetch et ve DOM’a ekle
fetch(svgURL)
  .then(res => res.text())
  .then(svgText => {
    container.innerHTML = svgText;
  })
  .catch(err => console.error("SVG yüklenemedi:", err));

// 2️⃣ Form ile metinleri güncelle
document.getElementById("update-btn").addEventListener("click", () => {
  const svg = container.querySelector("svg");
  if (!svg) return;

  const titleElem = svg.getElementById("slide-title");
  const subtitleElem = svg.getElementById("slide-subtitle");

  const title = document.getElementById("title-input").value;
  const subtitle = document.getElementById("subtitle-input").value;

  if(titleElem && title) titleElem.textContent = title;
  if(subtitleElem && subtitle) subtitleElem.textContent = subtitle;
});
</script>

</body>
</html>
