<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pro Editor | Kesin Boyutlandırma</title>
    <style>
        :root { --accent: #10b981; --bg: #0f172a; --panel: #1e293b; --border: #334155; }
        * { box-sizing: border-box; touch-action: none; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Giriş Paneli */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: var(--panel); padding: 30px; border-radius: 16px; width: 320px; text-align: center; border: 1px solid var(--border); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; text-align: center; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }

        #app-container { display: none; height: 100vh; flex-direction: row; width: 100%; }
        @media (max-width: 1023px) { #app-container { flex-direction: column; } }

        /* Sidebar */
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 1023px) { #sidebar { width: 100%; height: 50%; order: 2; border-top: 1px solid var(--border); } }
        
        .sidebar-nav { padding: 12px; background: #111827; border-bottom: 1px solid var(--border); }
        #editor-fields { flex: 1; overflow-y: auto; padding: 15px; }

        /* Ön İzleme Alanı */
        #main-view { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 20px; position: relative; }
        #svg-wrapper { position: relative; background: white; max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; }
        #canvas-inner svg { display: block; width: auto; height: auto; max-width: 100%; max-height: 80vh; }

        /* Kontrol Elemanları */
        .duzenlenebilir { cursor: move; pointer-events: all; }
        .resize-handle { fill: white; stroke: #3b82f6; stroke-width: 3; cursor: nwse-resize; pointer-events: all; }
        #control-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        .field-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: #ef4444; cursor: pointer; font-weight: bold; }
        #status-info { position: fixed; top: 0; width: 100%; background: var(--accent); text-align: center; padding: 10px; z-index: 11000; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-info">İŞLEM YAPILIYOR...</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Sistem Girişi</h2>
        <input type="password" id="passInput" placeholder="Şifre">
        <button onclick="login()">GİRİŞ YAP</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div id="svg-wrapper">
            <div id="canvas-inner"></div>
            <svg id="control-layer"></svg>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-nav">
            <select id="file-selector" onchange="loadSlide()" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px;">
                <option value="slayt.svg">Slayt 1</option>
                <option value="info.svg">Slayt 2</option>
            </select>
            <div style="display:flex; gap:8px;">
                <button onclick="saveData()" style="flex:2; padding:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">KAYDET</button>
                <button onclick="addNewText()" style="flex:1; padding:12px; background:#3b82f6; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ T</button>
                <button onclick="document.getElementById('img-in').click()" style="flex:1; padding:12px; background:#f97316; border:none; border-radius:8px; color:#fff; cursor:pointer;">+ IMG</button>
            </div>
            <input type="file" id="img-in" hidden onchange="addNewImage(this)">
        </div>
        <div id="editor-fields"></div>
    </div>
</div>

<script>
    const WORKER_URL = "https://githubtoken.tafbilgiislem.workers.dev"; // BURAYI GÜNCELLEYİN
    let SHA_KEY = "", SESSION_PASS = "", selectedEl = null, resizingEl = null, offset = {x:0, y:0};

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        if(!pass) return;
        SESSION_PASS = pass;
        await loadSlide();
    }

    async function loadSlide() {
        const file = document.getElementById('file-selector').value;
        const st = document.getElementById('status-info');
        st.style.display = "block";
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
            const data = await res.json();
            SHA_KEY = data.sha;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app-container').style.display = "flex";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            
            setTimeout(setupLayers, 300);
            st.style.display = "none";
        } catch(e) { alert("Hata!"); st.style.display="none"; }
    }

    function setupLayers() {
        const mainSvg = document.querySelector('#canvas-inner svg');
        const ctrl = document.getElementById('control-layer');
        if (!mainSvg) return;

        const vb = mainSvg.getAttribute("viewBox") || `0 0 1920 1080`;
        mainSvg.setAttribute("viewBox", vb);
        ctrl.setAttribute("viewBox", vb);
        
        mainSvg.querySelectorAll('text, image').forEach(el => {
            if(!el.id) el.id = "el_" + Math.random().toString(36).substr(2,9);
            el.classList.add('duzenlenebilir');
        });

        initEngine(mainSvg);
        renderFields();
    }

    function initEngine(svg) {
        const ctrl = document.getElementById('control-layer');

        const getCoords = (e) => {
            const rect = svg.getBoundingClientRect();
            const vb = svg.viewBox.baseVal;
            // Ekranda tıklanan yerin SVG içindeki gerçek koordinatı
            const x = (e.clientX - rect.left) * (vb.width / rect.width);
            const y = (e.clientY - rect.top) * (vb.height / rect.height);
            return { x, y };
        };

        const onDown = (e) => {
            const p = getCoords(e);
            
            // 1. Önce Boyutlandırma Tutamacı Kontrolü
            if (e.target.classList.contains('resize-handle')) {
                resizingEl = document.getElementById(e.target.dataset.id);
                // Başlangıç boyutlarını "o anki" halinden al
                const bbox = resizingEl.getBBox();
                resizingEl.dataset.startX = p.x;
                resizingEl.dataset.startW = resizingEl.tagName === "image" ? parseFloat(resizingEl.getAttribute("width")) : bbox.width;
                resizingEl.dataset.startSize = parseFloat(window.getComputedStyle(resizingEl).fontSize);
                
                e.preventDefault(); e.stopPropagation();
                return;
            }

            // 2. Taşıma Kontrolü
            const el = e.target.closest('.duzenlenebilir');
            if (el) {
                selectedEl = el;
                offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0);
                offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0);
                updateUI(el);
            } else {
                ctrl.innerHTML = "";
            }
        };

        const onMove = (e) => {
            if (!selectedEl && !resizingEl) return;
            const p = getCoords(e);

            if (resizingEl) {
                e.preventDefault();
                const diffX = p.x - parseFloat(resizingEl.dataset.startX);
                
                if (resizingEl.tagName === "image") {
                    const newW = Math.max(10, parseFloat(resizingEl.dataset.startW) + diffX);
                    // Orantılı büyütme (Genişlik ne kadar artarsa yükseklik de o kadar artsın)
                    const ratio = resizingEl.getAttribute("height") / resizingEl.getAttribute("width");
                    resizingEl.setAttribute("width", newW);
                    resizingEl.setAttribute("height", newW * (ratio || 1));
                } else {
                    // Metin Boyutlandırma
                    const newFontSize = Math.max(5, parseFloat(resizingEl.dataset.startSize) + (diffX / 2));
                    resizingEl.style.fontSize = newFontSize + "px";
                    resizingEl.setAttribute("font-size", newFontSize);
                }
                updateUI(resizingEl);
            } else if (selectedEl) {
                selectedEl.setAttribute("x", p.x - offset.x);
                selectedEl.setAttribute("y", p.y - offset.y);
                updateUI(selectedEl);
            }
        };

        const onUp = () => { selectedEl = null; resizingEl = null; };

        function updateUI(el) {
            ctrl.innerHTML = "";
            const b = el.getBBox();
            
            // Seçim Çerçevesi
            const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            r.setAttribute("x", b.x); r.setAttribute("y", b.y);
            r.setAttribute("width", b.width); r.setAttribute("height", b.height);
            r.setAttribute("fill", "none"); r.setAttribute("stroke", "#3b82f6"); r.setAttribute("stroke-width", "4");
            ctrl.appendChild(r);

            // Mavi Boyutlandırma Tutamacı (Sağ Alt)
            const h = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            const hS = 30; // Büyük tutamaç (Dokunmatik dostu)
            h.setAttribute("x", b.x + b.width - hS/2); h.setAttribute("y", b.y + b.height - hS/2);
            h.setAttribute("width", hS); h.setAttribute("height", hS);
            h.setAttribute("class", "resize-handle"); h.dataset.id = el.id;
            ctrl.appendChild(h);
        }

        // Pointer Events (Fare ve Dokunmatik bir arada)
        svg.addEventListener('pointerdown', onDown);
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
    }

    function renderFields() {
        const f = document.getElementById('editor-fields');
        f.innerHTML = "";
        document.querySelectorAll('.duzenlenebilir').forEach((el, i) => {
            const b = document.createElement('div');
            b.className = 'field-box';
            const col = el.getAttribute('fill') || el.style.fill || "#000000";
            b.innerHTML = `
                <span class="delete-btn" onclick="document.getElementById('${el.id}').remove(); renderFields();">×</span>
                <div style="font-size:10px; color:#888; font-weight:bold; margin-bottom:5px;">${el.tagName.toUpperCase()}</div>
                ${el.tagName === 'text' ? `<input type="text" value="${el.textContent}" oninput="document.getElementById('${el.id}').textContent=this.value" style="width:100%; padding:10px; border-radius:6px; border:1px solid #444; background:#000; color:#fff;">` : ''}
                <div style="margin-top:10px; display:flex; align-items:center;">
                    ${el.tagName === 'text' ? `<input type="color" value="${rgbToHex(col)}" oninput="const t=document.getElementById('${el.id}'); t.setAttribute('fill', this.value); t.style.fill=this.value;" style="width:45px; height:45px; cursor:pointer; border:none; border-radius:8px; background:none;">` : ''}
                    <span style="color:#94a3b8; margin-left:10px; font-size:11px;">Mavi kutudan tutup çekerek büyütün.</span>
                </div>`;
            f.appendChild(b);
        });
    }

    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const p = rgb.match(/\d+/g);
        return p ? "#" + p.map(x => parseInt(x).toString(16).padStart(2, '0')).join('').substring(0, 6) : "#000000";
    }

    function addNewText() {
        const svg = document.querySelector('#canvas-inner svg');
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.id = "t" + Date.now(); t.classList.add('duzenlenebilir');
        t.setAttribute("x", 100); t.setAttribute("y", 100); t.setAttribute("fill", "#000000");
        t.style.fontSize = "50px"; t.textContent = "YENİ METİN";
        svg.appendChild(t); renderFields();
    }

    function addNewImage(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const svg = document.querySelector('#canvas-inner svg');
            const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.id = "i" + Date.now(); img.classList.add('duzenlenebilir');
            img.setAttribute("x", 50); img.setAttribute("y", 50);
            img.setAttribute("width", 300); img.setAttribute("height", 300);
            img.setAttributeNS("http://www.w3.org/1999/xlink", "href", e.target.result);
            svg.appendChild(img); renderFields();
        };
        reader.readAsDataURL(file);
    }

    async function saveData() {
        const st = document.getElementById('status-info');
        st.innerText = "GÜNCELLENİYOR..."; st.style.display = "block";
        try {
            const svg = document.querySelector('#canvas-inner svg');
            const svgText = new XMLSerializer().serializeToString(svg);
            const b64 = btoa(unescape(encodeURIComponent(svgText)));
            await fetch(WORKER_URL, {
                method: "PUT",
                headers: {"Content-Type": "application/json", "X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value},
                body: JSON.stringify({message: "Fixed Resize Update", content: b64, sha: SHA_KEY})
            });
            st.innerText = "BAŞARIYLA KAYDEDİLDİ!";
            setTimeout(() => st.style.display="none", 2000);
        } catch(e) { alert("Hata!"); }
    }
</script>
</body>
</html>
